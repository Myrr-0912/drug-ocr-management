# 前端容器内 nginx：仅托管 SPA 静态资源，不做 TLS 终止（由入口 nginx 负责）
server {
    listen       80;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;

    # 启用 gzip 压缩
    gzip              on;
    gzip_comp_level   5;
    gzip_min_length   1024;
    gzip_types        text/plain text/css application/json application/javascript text/xml
                      application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_vary         on;

    # 带 hash 的静态资源：永久缓存
    location ~* \.(?:js|css|woff2?|ttf|otf|eot|ico|png|jpg|jpeg|gif|webp|svg)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # HTML 不缓存，保证前端发布即时生效
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # SPA 路由 fallback：未命中文件一律返回 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}

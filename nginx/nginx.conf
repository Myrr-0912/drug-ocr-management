# 入口反向代理：对外暴露 80/443，内部转发到 frontend:80 与 backend:8000
#
# 本地冒烟阶段（无证书）：仅使用 HTTP 80 server 块即可。
# WS2 上线阶段（Let's Encrypt 就位后）：取消 HTTPS server 块注释，并启用 80→443 重定向。

upstream backend_upstream {
    server backend:8000;
    keepalive 16;
}

upstream frontend_upstream {
    server frontend:80;
    keepalive 16;
}

# ------- HTTP 80 -------
server {
    listen       80;
    server_name  _;

    # 上线后开启 80→443 强制跳转（WS2 启用）
    # return 301 https://$host$request_uri;

    client_max_body_size 15m;

    # Let's Encrypt HTTP-01 质询（WS2 申请证书时使用）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 后端 API
    location /api/ {
        proxy_pass         http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # 健康检查（直接命中后端）
    location = /health {
        proxy_pass         http://backend_upstream/health;
        access_log         off;
    }

    # 上传图片静态文件：直接由入口 nginx 托管，避免走后端
    location /uploads/ {
        alias /var/www/uploads/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # 其余路径 → 前端 SPA 容器
    location / {
        proxy_pass         http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }
}


# 入口反向代理：对外暴露 80/443，内部转发到 frontend:80 与 backend:8000
#
# 本地冒烟阶段（无证书）：仅使用 HTTP 80 server 块即可。
# WS2 上线阶段（Let's Encrypt 就位后）：取消 HTTPS server 块注释，并启用 80→443 重定向。

upstream backend_upstream {
    server backend:8000;
    keepalive 16;
}

upstream frontend_upstream {
    server frontend:80;
    keepalive 16;
}

# ------- 限流区（http 层，被 /etc/nginx/nginx.conf 的 include 纳入）-------
# 通用 API：每 IP 20 req/s，突发 40 容许
limit_req_zone $binary_remote_addr zone=api_limit:10m   rate=20r/s;
# 登录接口：每 IP 5 req/min，防暴力破解
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;
# 限流被触发时返回 429 而非默认 503
limit_req_status 429;

# ------- HTTP 80 -------
server {
    listen       80;
    server_name  _;

    # 上线后开启 80→443 强制跳转（WS2 启用）
    # return 301 https://$host$request_uri;

    client_max_body_size 15m;

    # ===== OWASP 基础安全响应头（always 保证错误页也附带）=====
    add_header X-Frame-Options          "SAMEORIGIN"                    always;
    add_header X-Content-Type-Options   "nosniff"                       always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection         "1; mode=block"                 always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;
    # HSTS 待 WS2 启用 HTTPS 后在 443 server 块打开
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Let's Encrypt HTTP-01 质询（WS2 申请证书时使用）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 登录接口专用更严格限流（覆盖更宽松的 /api/ 限流）
    location = /api/v1/auth/login {
        limit_req zone=login_limit burst=3 nodelay;
        proxy_pass         http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # 后端 API（通用限流）
    location /api/ {
        limit_req zone=api_limit burst=40 nodelay;
        proxy_pass         http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # 健康检查（直接命中后端，不限流）
    location = /health {
        proxy_pass         http://backend_upstream/health;
        access_log         off;
    }

    # 上传图片静态文件：直接由入口 nginx 托管，避免走后端
    # 注意：nginx 的 add_header 指令在子作用域会完全覆盖父级同类指令，
    #      因此必须在此 location 内重复声明全部安全响应头，否则 /uploads/ 下会丢失
    location /uploads/ {
        alias /var/www/uploads/;
        expires 7d;
        add_header Cache-Control            "public"                        always;
        add_header X-Frame-Options          "SAMEORIGIN"                    always;
        add_header X-Content-Type-Options   "nosniff"                       always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
        add_header X-XSS-Protection         "1; mode=block"                 always;
        add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;
    }

    # 其余路径 → 前端 SPA 容器
    location / {
        proxy_pass         http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }
}

